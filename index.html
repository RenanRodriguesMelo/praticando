<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="assets/Github-Octicons-Dependabot-16.512.png"
      type="image/x-icon"
    />
    <title>Praticando</title>
  </head>

  <body>
    <div class="container">
      <h1>Login</h1>
      <form action="">
        <div class="input-group">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="E-mail"
            required
          />
        </div>

        <div class="input-group">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Senha"
            required
          />
        </div>

        <button type="submit">Entrar</button>
      </form>
    </div>
  </body>
</html>
